name: Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release
    permissions:
      id-token: write
      contents: write      # Tag + CHANGELOG-Commit zurueck nach main
      packages: write      # Push nach ghcr.io

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0           # volle Historie fuer semantic-release
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhaengigkeiten installieren
        run: pip install -r requirements.txt

      - name: Quality-Gate
        env:
          DJANGO_SETTINGS_MODULE: config.settings
          SECRET_KEY: ci-secret-key-not-for-production
        run: make check

      - name: python-semantic-release installieren
        run: pip install python-semantic-release

      - name: Release erstellen (Version + Tag + CHANGELOG)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: semantic-release version --push --tag --commit --changelog

      - name: Version auslesen
        id: version
        run: |
          VERSION=$(python -c "import karteikarten; print(karteikarten.__version__)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Docker anmelden (ghcr.io)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Image bauen und pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/karteikarten:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/karteikarten:latest
